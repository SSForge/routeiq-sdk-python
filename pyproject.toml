[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "routeiq-sdk"
version = "0.1.0"
description = "RouteIQ protobuf SDK — generated from routeiq-schema"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["protobuf>=5.0"]

[project.urls]
Homepage = "https://github.com/SSForge/routeiq-sdk-python"
Schema = "https://github.com/SSForge/routeiq-schema"

[tool.setuptools]
package-dir = {"" = "src/routeiq/_proto"}

[tool.setuptools.packages.find]
where = ["src/routeiq/_proto"]
namespaces = true
